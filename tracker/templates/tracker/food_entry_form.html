{% extends "base.html" %}

{% block title %}Add Food Entry{% endblock %}

{% block content %}
<h1 class="mb-4">Add Food Entry</h1>

<div class="card shadow-sm p-4">
    <form method="POST" novalidate>
        {% csrf_token %}

        {% for field in form %}
        <div class="mb-3">
            <label for="{{ field.id_for_label }}" class="form-label">
                {{ field.label }}
            </label>
            {{ field }}

            {% if field.errors %}
            <div class="text-danger small mt-1">
                {{ field.errors }}
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <button class="btn btn-primary">
            Save Entry
        </button>
    </form>
</div>
{% endblock %}
